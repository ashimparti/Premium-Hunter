name: Beaten-Down Hunter Scan

on:
  schedule:
    # 20:30 UTC = 12:30 AM Dubai (just after US close — fresh EOD data)
    - cron: '30 20 * * 1-5'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scanner
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          UNUSUAL_WHALES_API_KEY: ${{ secrets.UNUSUAL_WHALES_API_KEY }}
        run: |
          python beaten_down_hunter.py

      - name: Commit and push report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          TIMESTAMP=$(date -u +%Y-%m-%d_%H:%M)
          mkdir -p docs
          git add docs/latest.html
          git diff --cached --quiet || git commit -m "Update report ${TIMESTAMP}"
          git push
