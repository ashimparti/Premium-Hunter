name: Daily Premium Hunt

on:
  schedule:
    - cron: '0 2 * * 1-4'    # Mon-Thu 6 AM Dubai
    - cron: '0 13 * * 1-4'   # Mon-Thu 5 PM Dubai
    - cron: '0 13 * * 5'     # Friday 5 PM Dubai (weekend prep)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scanner
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python premium_hunter.py

      - name: Send email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: Premium Hunter — ${{ github.event.repository.updated_at }}
          to: mail@ashimparti.net
          from: Premium Hunter <${{ secrets.EMAIL_USERNAME }}>
          html_body: file://report.html

      - name: Publish to website
        run: |
          mkdir -p docs/archive
          DATE=$(date +%Y-%m-%d)
          cp report.html docs/latest.html
          cp report.html docs/archive/${DATE}.html
          # Keep only last 14 archive files
          ls -t docs/archive/*.html 2>/dev/null | tail -n +15 | xargs -r rm
          python generate_hub.py

      - name: Commit & push website
        run: |
          git config user.name "Premium Hunter Bot"
          git config user.email "bot@premiumhunter.local"
          git add docs/
          git diff --staged --quiet || git commit -m "Update report $(date +%Y-%m-%d_%H:%M)"
          git push
